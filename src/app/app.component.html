<div class="app-layout">
  <aside class="app-sidebar" [class.active]="sidebarActive">
    <div class="sidebar-brand">
      <div class="brand-logo">A</div>
      <div class="brand-text">Portal</div>
    </div>
    <nav class="sidebar-nav">
      <a routerLink="/message-composer" routerLinkActive="nav-link-active" (click)="closeSidebar()" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        Message Composer
      </a>
      <a routerLink="/contacts" routerLinkActive="nav-link-active" (click)="closeSidebar()" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
        Contact Manager
      </a>
    </nav>
    <div class="sidebar-footer">
      Version 1.0.0
    </div>
  </aside>

  <div class="sidebar-overlay" [class.active]="sidebarActive" (click)="closeSidebar()"></div>

  <!-- Main Container -->
  <div class="app-container">
    <header class="app-topbar">
      <div class="topbar-left">
        <button class="menu-toggle" (click)="toggleSidebar()" aria-label="Toggle Navigation Sidebar">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <span class="page-title">Campaign & Contacts Manager</span>
      </div>
      <div class="topbar-right">
        <div class="user-profile">
          <div class="avatar">DK</div>
          <div class="user-info">
            <span class="user-name">Dipin Karunakaran</span>
            <span class="user-role">Frontend Developer</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="app-content">
      <router-outlet></router-outlet>
    </main>
  </div>

  <app-toast-container></app-toast-container>
</div>
